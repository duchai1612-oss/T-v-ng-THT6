<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учим русский язык</title>
    <style>
        :root { --primary: #002f6c; --secondary: #cf102d; --light: #f4f4f4; --success: #28a745; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; border-bottom: 4px solid var(--secondary); padding-bottom: 10px; }
        
        .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: #004494; transform: translateY(-2px); }
        
        .game-section { display: none; animation: fadeIn 0.5s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Score & Student Info */
        .info-bar { display: flex; justify-content: space-between; background: #e9ecef; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }

        /* Flashcard Styles */
        .flashcard-container { display: flex; flex-direction: column; align-items: center; }
        .card { width: 320px; height: 200px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; border: 3px solid var(--primary); box-sizing: border-box; padding: 20px; font-size: 22px; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }

        /* Matching Game */
        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .match-item { padding: 15px; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; background: white; }
        .match-item.selected { border-color: var(--secondary); background: #fff5f5; }
        .match-item.correct { background: var(--success); color: white; border-color: var(--success); visibility: hidden; }

        /* Inputs */
        .input-box { font-size: 24px; padding: 10px; width: 200px; text-align: center; border: 2px solid var(--primary); border-radius: 8px; margin: 15px 0; }
        
        /* Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Учим русский язык</h1>

    <div class="info-bar">
        <span>Студент: <span id="displayStudent">Гость</span></span>
        <span style="color: var(--secondary);">Баллы: <span id="displayScore">0</span></span>
    </div>

    <div class="nav-menu">
        <button onclick="showSection('section-flash')">Flashcards</button>
        <button onclick="showSection('section-match')">Trò chơi nối từ</button>
        <button onclick="showSection('section-fill')">Điền chữ cái</button>
        <button onclick="showSection('section-grammar')">Tính từ + Danh từ</button>
        <button onclick="showSection('section-admin')">Quản lý GV</button>
    </div>

    <div id="section-flash" class="game-section active">
        <div class="flashcard-container">
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front"><strong id="f-ru">Слово</strong><br><small id="f-pos"></small></div>
                    <div class="card-back" id="f-vi">Nghĩa</div>
                </div>
            </div>
            <button onclick="nextFlashcard()">Tiếp theo ➔</button>
        </div>
    </div>

    <div id="section-match" class="game-section">
        <p>Chọn từ tiếng Nga và nghĩa tiếng Việt tương ứng:</p>
        <div id="match-board" class="matching-grid"></div>
        <button onclick="initMatching()" style="margin-top:20px; background: var(--secondary);">Làm mới trò chơi</button>
    </div>

    <div id="section-fill" class="game-section">
        <center>
            <h3>Điền chữ cái còn thiếu (_)</h3>
            <p id="fill-word" style="font-size: 32px; letter-spacing: 10px; font-weight: bold;"></p>
            <p id="fill-hint" style="color: #666;"></p>
            <input type="text" id="fill-input" class="input-box" maxlength="1" placeholder="?">
            <br>
            <button onclick="checkFill()">Kiểm tra</button>
        </center>
    </div>

    <div id="section-grammar" class="game-section">
        <h3>Ghép tính từ phù hợp với danh từ</h3>
        <p>Chọn tính từ đúng với giống (đực, cái, trung) của danh từ:</p>
        <div id="grammar-quest" style="font-size: 24px; margin: 20px 0; text-align: center;"></div>
        <div id="grammar-options" style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;"></div>
    </div>

    <div id="section-admin" class="game-section">
        <h3>Hệ thống quản lý sinh viên</h3>
        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <input type="text" id="studentInput" placeholder="Nhập tên sinh viên mới..." style="padding: 10px; width: 60%;">
            <button onclick="registerStudent()">Đăng ký</button>
        </div>
        <table id="adminTable">
            <thead><tr><th>Tên sinh viên</th><th>Điểm số cao nhất</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="clearData()" style="background: #666; margin-top: 10px; font-size: 12px;">Xóa toàn bộ dữ liệu</button>
    </div>
</div>

<script>
    // Dữ liệu từ file PDF của bạn 
    const rawData = [
        {ru: "открытка", vi: "bưu thiếp", pos: "сущ. ж.р.", fill: "откр_тка", char: "ы", adj: "Красивая"},
        {ru: "рисовать", vi: "vẽ", pos: "глагол", fill: "рисова_ь", char: "т", adj: "Долго"},
        {ru: "учебник", vi: "giáo trình", pos: "сущ. м.р.", fill: "учебн_к", char: "и", adj: "Новый"},
        {ru: "медаль", vi: "huy chương", pos: "сущ. ж.р.", fill: "мед_ль", char: "а", adj: "Золотая"},
        {ru: "близкий", vi: "thân thiết", pos: "прил.", fill: "бл_зкий", char: "и", adj: "Очень"},
        {ru: "мечта", vi: "ước mơ", pos: "сущ. ж.р.", fill: "меч_а", char: "т", adj: "Большая"},
        {ru: "режиссёр", vi: "đạo diễn", pos: "сущ. м.р.", fill: "режи_сёр", char: "с", adj: "Известный"},
        {ru: "спектакль", vi: "vở kịch", pos: "сущ. м.р.", fill: "спект_кль", char: "а", adj: "Интересный"},
        {ru: "певица", vi: "ca sĩ nữ", pos: "сущ. ж.р.", fill: "пев_ца", char: "и", adj: "Талантливая"},
        {ru: "гитара", vi: "đàn ghi-ta", pos: "сущ. ж.р.", fill: "гит_ра", char: "а", adj: "Старая"},
        {ru: "волосы", vi: "tóc", pos: "сущ. мн.ч.", fill: "вол_сы", char: "о", adj: "Длинные"},
        {ru: "фигура", vi: "thân hình", pos: "сущ. ж.р.", fill: "фиг_ра", char: "у", adj: "Стройная"},
        {ru: "костюм", vi: "bộ trang phục", pos: "сущ. м.р.", fill: "кост_юм", char: "т", adj: "Синий"},
        {ru: "куртка", vi: "áo khoác", pos: "сущ. ж.р.", fill: "курт_а", char: "к", adj: "Тёплая"},
        {ru: "чайник", vi: "ấm đun nước", pos: "сущ. м.р.", fill: "чайн_к", char: "и", adj: "Электрический"},
        {ru: "холодильник", vi: "tủ lạnh", pos: "сущ. м.р.", fill: "холод_льник", char: "и", adj: "Белый"},
        {ru: "пирог", vi: "bánh nướng", pos: "сущ. м.р.", fill: "пир_г", char: "о", adj: "Вкусный"},
        {ru: "деревня", vi: "miền quê", pos: "сущ. ж.р.", fill: "дерев_я", char: "н", adj: "Маленькая"},
        {ru: "кольцо", vi: "nhẫn", pos: "сущ. с.р.", fill: "кол_цо", char: "ь", adj: "Золотое"},
        {ru: "конфета", vi: "kẹo", pos: "сущ. ж.р.", fill: "конф_та", char: "е", adj: "Сладкая"},
        {ru: "секретарь", vi: "thư ký", pos: "сущ. м.р.", fill: "секрет_рь", char: "а", adj: "Опытный"},
        {ru: "талантливый", vi: "tài năng", pos: "прил.", fill: "талантл_вый", char: "и", adj: "Очень"},
        {ru: "сказка", vi: "truyện cổ tích", pos: "сущ. ж.р.", fill: "ска_ка", char: "з", adj: "Русская"},
        {ru: "настроение", vi: "tâm trạng", pos: "сущ. с.р.", fill: "настро_ние", char: "е", adj: "Хорошее"},
        {ru: "лекарство", vi: "thuốc", pos: "сущ. с.р.", fill: "лекарст_о", char: "в", adj: "Горькое"},
        {ru: "продукты", vi: "thực phẩm", pos: "сущ. мн.ч.", fill: "проду_ты", char: "к", adj: "Свежие"},
        {ru: "утюг", vi: "bàn là", pos: "сущ. м.р.", fill: "ут_г", char: "ю", adj: "Горячий"},
        {ru: "взрослый", vi: "người lớn", pos: "прил.", fill: "взрос_ый", char: "л", adj: "Умный"}
    ];

    let score = 0;
    let currentStudent = "Гость";
    let database = JSON.parse(localStorage.getItem('rus_db')) || [];

    // Navigation
    function showSection(id) {
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'section-match') initMatching();
        if(id === 'section-fill') loadFillWord();
        if(id === 'section-grammar') loadGrammar();
        if(id === 'section-admin') updateAdminTable();
    }

    // Flashcard Logic
    let fIdx = 0;
    function nextFlashcard() {
        fIdx = (fIdx + 1) % rawData.length;
        document.getElementById('f-ru').innerText = rawData[fIdx].ru;
        document.getElementById('f-pos').innerText = rawData[fIdx].pos;
        document.getElementById('f-vi').innerText = rawData[fIdx].vi;
        document.querySelector('.card').classList.remove('flipped');
    }

    // Matching Logic
    let selectedFirst = null;
    function initMatching() {
        const board = document.getElementById('match-board');
        board.innerHTML = "";
        let items = [];
        let subset = [...rawData].sort(() => 0.5 - Math.random()).slice(0, 4);
        
        subset.forEach(item => {
            items.push({text: item.ru, matchId: item.ru, type: 'ru'});
            items.push({text: item.vi, matchId: item.ru, type: 'vi'});
        });
        
        items.sort(() => 0.5 - Math.random()).forEach(data => {
            const div = document.createElement('div');
            div.className = "match-item";
            div.innerText = data.text;
            div.onclick = () => handleMatchClick(div, data);
            board.appendChild(div);
        });
    }

    function handleMatchClick(el, data) {
        if(el.classList.contains('correct')) return;
        if(selectedFirst) {
            if(selectedFirst.data.matchId === data.matchId && selectedFirst.data.type !== data.type) {
                el.classList.add('correct');
                selectedFirst.el.classList.add('correct');
                score += 20;
                updateScore();
            } else {
                selectedFirst.el.classList.remove('selected');
            }
            selectedFirst = null;
        } else {
            selectedFirst = {el, data};
            el.classList.add('selected');
        }
    }

    // Fill Letter Logic
    let fillIdx = 0;
    function loadFillWord() {
        fillIdx = Math.floor(Math.random() * rawData.length);
        document.getElementById('fill-word').innerText = rawData[fillIdx].fill;
        document.getElementById('fill-hint').innerText = "Nghĩa: " + rawData[fillIdx].vi;
        document.getElementById('fill-input').value = "";
    }

    function checkFill() {
        let input = document.getElementById('fill-input').value.toLowerCase();
        if(input === rawData[fillIdx].char) {
            alert("Đúng rồi! +10 điểm");
            score += 10;
            updateScore();
            loadFillWord();
        } else {
            alert("Sai rồi, hãy thử lại!");
        }
    }

    // Grammar Logic
    function loadGrammar() {
        let item = rawData[Math.floor(Math.random() * rawData.length)];
        // Chỉ chọn danh từ
        if(!item.pos.includes("сущ")) { loadGrammar(); return; }
        
        document.getElementById('grammar-quest').innerText = `... ${item.ru} (${item.pos})`;
        let options = [item.adj];
        while(options.length < 3) {
            let r = rawData[Math.floor(Math.random()*rawData.length)].adj;
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => 0.5 - Math.random());
        
        document.getElementById('grammar-options').innerHTML = options.map(opt => 
            `<button onclick="checkGrammar('${opt}', '${item.adj}')">${opt}</button>`
        ).join('');
    }

    function checkGrammar(sel, correct) {
        if(sel === correct) {
            alert("Giỏi lắm! +15 điểm");
            score += 15;
            updateScore();
            loadGrammar();
        } else {
            alert("Sai giống hoặc sai nghĩa rồi!");
        }
    }

    // Admin & Storage
    function registerStudent() {
        let name = document.getElementById('studentInput').value.trim();
        if(name) {
            currentStudent = name;
            document.getElementById('displayStudent').innerText = name;
            if(!database.find(s => s.name === name)) {
                database.push({name: name, score: 0});
                saveData();
            }
            alert("Chào mừng " + name + "!");
        }
    }

    function updateScore() {
        document.getElementById('displayScore').innerText = score;
        let student = database.find(s => s.name === currentStudent);
        if(student && score > student.score) {
            student.score = score;
            saveData();
        }
    }

    function updateAdminTable() {
        const tbody = document.querySelector('#adminTable tbody');
        tbody.innerHTML = database
            .sort((a,b) => b.score - a.score)
            .map(s => `<tr><td>${s.name}</td><td>${s.score}</td></tr>`).join('');
    }

    function saveData() { localStorage.setItem('rus_db', JSON.stringify(database)); }
    function clearData() { if(confirm("Xóa hết dữ liệu sinh viên?")) { localStorage.clear(); location.reload(); } }

    // Init first load
    nextFlashcard();
</script>
</body>
</html>
