 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учим русский язык</title>
    <style>
        :root { --primary: #002f6c; --secondary: #cf102d; --light: #f4f4f4; --success: #28a745; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; border-bottom: 4px solid var(--secondary); padding-bottom: 10px; }
        
        .nav-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
        button { padding: 12px 18px; cursor: pointer; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: bold; transition: 0.3s; font-size: 16px; }
        button:hover { background: #004494; transform: translateY(-2px); }
        
        .game-section { display: none; animation: fadeIn 0.5s; text-align: center; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-bar { display: flex; justify-content: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 18px; }

        /* Flashcard Styles */
        .flashcard-container { display: flex; flex-direction: column; align-items: center; }
        .card { width: 320px; height: 200px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; border: 3px solid var(--primary); box-sizing: border-box; padding: 20px; font-size: 24px; }
        .card-back { background: var(--primary); color: white; transform: rotateY(180deg); }

        /* Matching Game */
        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: auto; }
        .match-item { padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; font-size: 16px; transition: 0.2s; }
        .match-item.selected { border-color: var(--secondary); background: #fff5f5; }
        .match-item.correct { background: var(--success); color: white; visibility: hidden; }

        /* Fill In Blank */
        .input-box { font-size: 24px; padding: 10px; width: 60px; text-align: center; border: 2px solid var(--primary); border-radius: 8px; margin: 15px 0; outline: none; }
        
        /* Adjective Noun */
        .opt-btn { background: #6c757d; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Учим русский язык</h1>

    <div class="info-bar">
        <span style="color: var(--secondary);">Ваш счёт: <span id="displayScore">0</span></span>
    </div>

    <div class="nav-menu">
        <button onclick="showSection('section-flash')">Карточки</button>
        <button onclick="showSection('section-match')">Соедини пары</button>
        <button onclick="showSection('section-fill')">Вставь букву</button>
        <button onclick="showSection('section-grammar')">Прилагательное</button>
    </div>

    <div id="section-flash" class="game-section active">
        <div class="flashcard-container">
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-front"><strong id="f-ru">Слово</strong><br><small id="f-pos" style="font-size:14px; color: grey;"></small></div>
                    <div class="card-back"><span id="f-vi">Перевод</span></div>
                </div>
            </div>
            <button onclick="nextFlashcard()">Следующее слово ➔</button>
        </div>
    </div>

    <div id="section-match" class="game-section">
        <p>Найдите правильные пары (Русский - Вьетнамский):</p>
        <div id="match-board" class="matching-grid"></div>
        <button onclick="initMatching()" style="margin-top:20px; background: var(--secondary);">Начать заново</button>
    </div>

    <div id="section-fill" class="game-section">
        <h3>Какая буква пропущена?</h3>
        <p id="fill-word" style="font-size: 36px; letter-spacing: 12px; font-weight: bold; color: var(--primary);"></p>
        <p id="fill-hint" style="font-style: italic; color: #666;"></p>
        <input type="text" id="fill-input" class="input-box" maxlength="1">
        <br>
        <button onclick="checkFill()">Проверить</button>
    </div>

    <div id="section-grammar" class="game-section">
        <h3>Выберите подходящее прилагательное:</h3>
        <div id="grammar-quest" style="font-size: 26px; margin: 20px 0; font-weight: bold;"></div>
        <div id="grammar-options"></div>
    </div>
</div>

<script>
    // Toàn bộ từ vựng được trích xuất từ tài liệu [cite: 6, 7, 8, 9, 10]
    const wordData = [
        {ru: "открытка", vi: "bưu thiếp", pos: "сущ. ж.р.", fill: "откр_тка", char: "ы", adj: "Красивая"},
        {ru: "рисовать", vi: "vẽ", pos: "глагол", fill: "рисова_ь", char: "т", adj: "Долго"},
        {ru: "учебник", vi: "giáo trình", pos: "сущ. м.р.", fill: "учебн_к", char: "и", adj: "Новый"},
        {ru: "медаль", vi: "huy chương", pos: "сущ. ж.р.", fill: "мед_ль", char: "а", adj: "Золотая"},
        {ru: "близкий", vi: "thân thiết", pos: "прил.", fill: "бл_зкий", char: "и", adj: "Очень"},
        {ru: "мечта", vi: "ước mơ", pos: "сущ. ж.р.", fill: "меч_а", char: "т", adj: "Большая"},
        {ru: "режиссёр", vi: "đạo diễn", pos: "сущ. м.р.", fill: "режи_сёр", char: "с", adj: "Известный"},
        {ru: "спектакль", vi: "vở kịch", pos: "сущ. м.р.", fill: "спект_кль", char: "а", adj: "Интересный"},
        {ru: "певица", vi: "ca sĩ nữ", pos: "сущ. ж.р.", fill: "пев_ца", char: "и", adj: "Талантливая"},
        {ru: "гитара", vi: "đàn ghi-ta", pos: "сущ. ж.р.", fill: "гит_ра", char: "а", adj: "Старая"},
        {ru: "волосы", vi: "tóc", pos: "сущ. мн.ч.", fill: "вол_сы", char: "о", adj: "Длинные"},
        {ru: "фигура", vi: "thân hình", pos: "сущ. ж.р.", fill: "фиг_ра", char: "у", adj: "Стройная"},
        {ru: "костюм", vi: "bộ trang phục", pos: "сущ. м.р.", fill: "кост_юм", char: "т", adj: "Синий"},
        {ru: "куртка", vi: "áo khoác", pos: "сущ. ж.р.", fill: "курт_а", char: "к", adj: "Тёплая"},
        {ru: "чайник", vi: "ấm đun nước", pos: "сущ. м.р.", fill: "чайн_к", char: "и", adj: "Электрический"},
        {ru: "холодильник", vi: "tủ lạnh", pos: "сущ. м.р.", fill: "холод_льник", char: "и", adj: "Белый"},
        {ru: "пирог", vi: "bánh nướng", pos: "сущ. м.р.", fill: "пир_г", char: "о", adj: "Вкусный"},
        {ru: "деревня", vi: "miền quê", pos: "сущ. ж.р.", fill: "дерев_я", char: "н", adj: "Маленькая"},
        {ru: "кольцо", vi: "nhẫn", pos: "сущ. с.р.", fill: "кол_цо", char: "ь", adj: "Золотое"},
        {ru: "конфета", vi: "kẹo", pos: "сущ. ж.р.", fill: "конф_та", char: "е", adj: "Сладкая"},
        {ru: "секретарь", vi: "thư ký", pos: "сущ. м.р.", fill: "секрет_рь", char: "а", adj: "Опытный"},
        {ru: "талантливый", vi: "tài năng", pos: "прил.", fill: "талантл_вый", char: "и", adj: "Очень"},
        {ru: "сказка", vi: "truyện cổ tích", pos: "сущ. ж.р.", fill: "ска_ка", char: "з", adj: "Русская"},
        {ru: "настроение", vi: "tâm trạng", pos: "сущ. с.р.", fill: "настро_ние", char: "е", adj: "Хорошее"},
        {ru: "лекарство", vi: "thuốc", pos: "сущ. с.р.", fill: "лекарст_о", char: "в", adj: "Горькое"},
        {ru: "продукты", vi: "thực phẩm", pos: "сущ. мн.ч.", fill: "проду_ты", char: "к", adj: "Свежие"},
        {ru: "утюг", vi: "bàn là", pos: "сущ. м.р.", fill: "ут_г", char: "ю", adj: "Горячий"},
        {ru: "взрослый", vi: "người lớn", pos: "прил.", fill: "взрос_ый", char: "л", adj: "Умный"}
    ];

    let totalScore = 0;

    function showSection(id) {
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'section-match') initMatching();
        if(id === 'section-fill') loadFillWord();
        if(id === 'section-grammar') loadGrammar();
    }

    // Flashcards
    let flashIdx = 0;
    function nextFlashcard() {
        flashIdx = (flashIdx + 1) % wordData.length;
        document.getElementById('f-ru').innerText = wordData[flashIdx].ru;
        document.getElementById('f-pos').innerText = wordData[flashIdx].pos;
        document.getElementById('f-vi').innerText = wordData[flashIdx].vi;
        document.querySelector('.card').classList.remove('flipped');
    }

    // Matching
    let firstChoice = null;
    function initMatching() {
        const board = document.getElementById('match-board');
        board.innerHTML = "";
        let items = [];
        let subset = [...wordData].sort(() => 0.5 - Math.random()).slice(0, 5);
        subset.forEach(w => {
            items.push({t: w.ru, id: w.ru, type: 'ru'});
            items.push({t: w.vi, id: w.ru, type: 'vi'});
        });
        items.sort(() => 0.5 - Math.random()).forEach(data => {
            const div = document.createElement('div');
            div.className = "match-item";
            div.innerText = data.t;
            div.onclick = () => {
                if(div.classList.contains('correct')) return;
                if(firstChoice) {
                    if(firstChoice.data.id === data.id && firstChoice.data.type !== data.type) {
                        div.classList.add('correct');
                        firstChoice.el.classList.add('correct');
                        totalScore += 20; updateScore();
                    } else { firstChoice.el.classList.remove('selected'); }
                    firstChoice = null;
                } else {
                    firstChoice = {el: div, data: data};
                    div.classList.add('selected');
                }
            };
            board.appendChild(div);
        });
    }

    // Fill logic
    let currentFill;
    function loadFillWord() {
        currentFill = wordData[Math.floor(Math.random() * wordData.length)];
        document.getElementById('fill-word').innerText = currentFill.fill;
        document.getElementById('fill-hint').innerText = "Перевод: " + currentFill.vi;
        document.getElementById('fill-input').value = "";
    }

    function checkFill() {
        if(document.getElementById('fill-input').value.toLowerCase() === currentFill.char) {
            alert("Правильно! +10"); totalScore += 10; updateScore(); loadFillWord();
        } else { alert("Неправильно, попробуйте ещё раз!"); }
    }

    // Grammar logic
    function loadGrammar() {
        let item = wordData[Math.floor(Math.random() * wordData.length)];
        if(!item.pos.includes("сущ")) { loadGrammar(); return; }
        document.getElementById('grammar-quest').innerText = `... ${item.ru} (${item.pos})`;
        let opts = [item.adj];
        while(opts.length < 3) {
            let r = wordData[Math.floor(Math.random()*wordData.length)].adj;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => 0.5 - Math.random());
        document.getElementById('grammar-options').innerHTML = opts.map(o => 
            `<button class="opt-btn" onclick="checkGrammar('${o}', '${item.adj}')">${o}</button>`
        ).join('');
    }

    function checkGrammar(s, c) {
        if(s === c) { alert("Верно! +15"); totalScore += 15; updateScore(); loadGrammar(); }
        else { alert("Ошибка!"); }
    }

    function updateScore() { document.getElementById('displayScore').innerText = totalScore; }
    
    // Init
    nextFlashcard();
</script>
</body>
</html>
